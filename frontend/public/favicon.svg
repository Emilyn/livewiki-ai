<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Page shape -->
  <rect x="5" y="5" width="15" height="20" rx="2" fill="none" stroke="white" stroke-width="1.75" opacity="0.9"/>
  <!-- Content lines -->
  <line x1="8.5" y1="11" x2="16.5" y2="11" stroke="white" stroke-width="1.75" stroke-linecap="round" opacity="0.9"/>
  <line x1="8.5" y1="15" x2="16.5" y2="15" stroke="white" stroke-width="1.75" stroke-linecap="round" opacity="0.9"/>
  <line x1="8.5" y1="19" x2="13" y2="19" stroke="white" stroke-width="1.75" stroke-linecap="round" opacity="0.9"/>
  <!-- Lightning bolt (live indicator) -->
  <path d="M23 5 L19.5 14 L23 14 L19.5 27" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow dot at top of bolt -->
  <circle cx="23" cy="5" r="1.75" fill="#c4b5fd"/>
</svg>
